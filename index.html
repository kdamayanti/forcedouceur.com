async function supaInsert(table, data) {
  try {
    const res = await fetch(SUPA_URL + table, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) {
      const err = await res.text();
      console.error('Supabase error [' + table + ']:', res.status, err);
      return false;
    }
    console.log('Supabase OK [' + table + ']');
    return true;
  } catch(e) {
    console.error('Supabase fetch error:', e.message);
    return false;
  }
}

// FORM FEMME HERO
async function submitFemme() {
  const email = document.getElementById('f-email').value.trim();
  const prenom = document.getElementById('f-prenom').value.trim();
  if(!email.includes('@') || !prenom) { alert('Merci de remplir ton prénom et email.'); return; }

  const btn = document.querySelector('#form-femme .submit-btn');
  btn.disabled = true; btn.textContent = 'Envoi...';

  const ok = await supaInsert('emails_capture', {
    email,
    prenom,
    source: 'hero_femme'
    // etape_parcours: document.getElementById('f-etape').value || null  // supprimé
  });

  if(ok) {
    document.getElementById('success-femme').style.display = 'block';
    btn.style.display = 'none';
  } else {
    btn.disabled = false;
    btn.textContent = '🌸 Rejoindre gratuitement';
    alert('Erreur Supabase — ouvre la console (F12) pour voir le détail.');
  }
}

// FORM PRO HERO
async function submitPro() {
  const email = document.getElementById('p-email').value;
  const nom = document.getElementById('p-nom').value;
  if(!email.includes('@') || !nom) { alert('Merci de remplir votre nom et email.'); return; }
  await supaInsert('pros', {
    nom, email_contact: email, type_pro: document.getElementById('p-type').value,
    mode: 'À préciser', statut:'candidature', etapes: []
  });
  document.getElementById('success-pro').style.display = 'block';
  document.querySelector('#form-pro .submit-btn').style.display = 'none';
}
